<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login · Flanorx Operations</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts: Manrope -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Material Symbols Outlined -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#13ec5b",
              "background-light": "#f6f8f6",
              "background-dark": "#102216",
            },
            fontFamily: { display: ["Manrope", "sans-serif"] },
            borderRadius: {
              xl: "0.75rem",
              "2xl": "1rem",
              "3xl": "1.5rem",
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family: "Manrope", sans-serif;
      }
      .hero-grid {
        background-image:
          linear-gradient(rgba(19, 236, 91, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(19, 236, 91, 0.08) 1px, transparent 1px);
        background-size: 44px 44px;
      }
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        max-width: 400px;
        animation: slideIn 0.3s ease;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(100px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen"
  >
    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
      <div
        id="toastContent"
        class="rounded-2xl border p-4 shadow-xl backdrop-blur-md bg-white dark:bg-slate-900"
      >
        <p id="toastTitle" class="text-sm font-extrabold mb-1"></p>
        <p id="toastMessage" class="text-xs opacity-80"></p>
      </div>
    </div>

    <div
      class="relative flex min-h-screen flex-col items-center justify-center hero-grid px-4"
    >
      <!-- Background gradients -->
      <div
        class="absolute inset-0 -z-10 bg-gradient-to-br from-white via-background-light to-primary/10 dark:from-background-dark dark:via-slate-950 dark:to-primary/10"
      ></div>
      <div
        class="absolute left-1/2 top-20 -z-10 size-[420px] -translate-x-1/2 rounded-full bg-primary/20 blur-3xl"
      ></div>
      <div
        class="absolute bottom-10 right-0 -z-10 size-[360px] rounded-full bg-yellow-400/20 blur-3xl"
      ></div>

      <!-- Login Card -->
      <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
          <img src="flanorx.png" alt="Flanorx Logo" class="h-8 mx-auto mb-6" />
          <div
            class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-primary/10 border border-primary/30 backdrop-blur-md mb-4"
          >
            <span class="material-symbols-outlined text-primary text-sm"
              >admin_panel_settings</span
            >
            <span
              class="text-xs font-black text-primary uppercase tracking-wider"
              >Admin Access Only</span
            >
          </div>
          <h1
            class="text-3xl font-black text-slate-900 dark:text-white tracking-tight"
          >
            Welcome Back
          </h1>
          <p class="text-slate-500 mt-2 text-sm">
            Sign in to access the Flanorx admin dashboard
          </p>
        </div>

        <!-- Login Form -->
        <div
          class="bg-white dark:bg-slate-900 rounded-3xl p-8 shadow-2xl border border-slate-200 dark:border-slate-800"
        >
          <form id="loginForm" class="space-y-5">
            <div class="space-y-2">
              <label
                class="text-xs font-black text-slate-500 uppercase tracking-wider"
                >Email Address</label
              >
              <div class="relative">
                <span
                  class="material-symbols-outlined text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 text-xl"
                  >mail</span
                >
                <input
                  id="loginEmail"
                  type="email"
                  class="w-full pl-10 pr-4 py-3 rounded-xl border-slate-200 bg-slate-50 dark:bg-slate-800 dark:border-slate-700 focus:ring-primary focus:border-primary text-sm"
                  placeholder="admin@flanorx.com"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label
                  class="text-xs font-black text-slate-500 uppercase tracking-wider"
                  >Password</label
                >
                <a
                  href="#"
                  class="text-xs font-bold text-primary hover:underline"
                  >Forgot password?</a
                >
              </div>
              <div class="relative">
                <span
                  class="material-symbols-outlined text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 text-xl"
                  >lock</span
                >
                <input
                  id="loginPassword"
                  type="password"
                  class="w-full pl-10 pr-12 py-3 rounded-xl border-slate-200 bg-slate-50 dark:bg-slate-800 dark:border-slate-700 focus:ring-primary focus:border-primary text-sm"
                  placeholder="••••••••"
                  required
                  autocomplete="current-password"
                />
                <button
                  type="button"
                  id="togglePassword"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300"
                >
                  <span class="material-symbols-outlined text-xl"
                    >visibility</span
                  >
                </button>
              </div>
            </div>

            <div class="flex items-center gap-2">
              <input
                id="rememberMe"
                type="checkbox"
                class="rounded border-slate-300 text-primary focus:ring-primary"
              />
              <label
                for="rememberMe"
                class="text-sm font-medium text-slate-600 dark:text-slate-400"
                >Remember me</label
              >
            </div>

            <button
              type="submit"
              id="loginBtn"
              class="w-full py-3 bg-primary text-slate-900 font-black rounded-xl hover:shadow-lg hover:shadow-primary/30 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <span id="loginBtnText">Sign In</span>
              <span id="loginSpinner" class="hidden">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                  <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"
                    fill="none"
                  ></circle>
                  <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                  ></path>
                </svg>
              </span>
            </button>
          </form>

          <div
            id="loginError"
            class="mt-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl hidden"
          >
            <p
              class="text-red-600 dark:text-red-400 text-xs font-bold text-center"
            ></p>
          </div>

          <div
            class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-800"
          >
            <p class="text-center text-xs text-slate-500">
              Protected admin area. Unauthorized access is prohibited.
            </p>
          </div>
        </div>

        <!-- Back to site -->
        <div class="text-center mt-6">
          <a
            href="index.html"
            class="text-sm font-bold text-slate-500 hover:text-primary transition-colors flex items-center justify-center gap-1"
          >
            <span class="material-symbols-outlined text-sm">arrow_back</span>
            Back to website
          </a>
        </div>
      </div>
    </div>

    <script>
      (function () {
        // ---------- CONFIGURATION ----------
        const API_BASE_URL =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1"
            ? "http://127.0.0.1:8000"
            : "https://flanorx-api.onrender.com";

        // ---------- DOM ELEMENTS ----------
        const loginForm = document.getElementById("loginForm");
        const loginEmail = document.getElementById("loginEmail");
        const loginPassword = document.getElementById("loginPassword");
        const loginBtn = document.getElementById("loginBtn");
        const loginBtnText = document.getElementById("loginBtnText");
        const loginSpinner = document.getElementById("loginSpinner");
        const loginError = document.getElementById("loginError");
        const togglePassword = document.getElementById("togglePassword");
        const rememberMe = document.getElementById("rememberMe");
        const toast = document.getElementById("toast");
        const toastTitle = document.getElementById("toastTitle");
        const toastMessage = document.getElementById("toastMessage");
        const toastContent = document.getElementById("toastContent");

        // ---------- TOAST ----------
        function showToast(title, message, type = "success") {
          if (!toast || !toastTitle || !toastMessage) return;
          toastContent.className =
            "rounded-2xl border p-4 shadow-xl backdrop-blur-md bg-white dark:bg-slate-900";
          if (type === "success") {
            toastContent.classList.add(
              "border-green-300",
              "text-green-800",
              "dark:text-green-300",
            );
          } else if (type === "error") {
            toastContent.classList.add(
              "border-red-300",
              "text-red-800",
              "dark:text-red-300",
            );
          } else {
            toastContent.classList.add(
              "border-blue-300",
              "text-blue-800",
              "dark:text-blue-300",
            );
          }
          toastTitle.textContent = title;
          toastMessage.textContent = message;
          toast.classList.remove("hidden");
          clearTimeout(window.toastTimeout);
          window.toastTimeout = setTimeout(
            () => toast.classList.add("hidden"),
            5000,
          );
        }

        // ---------- TOGGLE PASSWORD VISIBILITY ----------
        if (togglePassword) {
          togglePassword.addEventListener("click", () => {
            const type =
              loginPassword.getAttribute("type") === "password"
                ? "text"
                : "password";
            loginPassword.setAttribute("type", type);
            const icon = togglePassword.querySelector(
              ".material-symbols-outlined",
            );
            if (icon) {
              icon.textContent =
                type === "password" ? "visibility" : "visibility_off";
            }
          });
        }

        // ---------- CHECK EXISTING SESSION ----------
        const existingToken = localStorage.getItem("flanorx_admin_token");
        const existingUser = localStorage.getItem("flanorx_admin_user");

        if (existingToken && existingUser) {
          // Already logged in, redirect to dashboard
          const redirectUrl =
            new URLSearchParams(window.location.search).get("redirect") ||
            "admin-dashboard.html";
          window.location.href = redirectUrl;
        }

        // ---------- HANDLE LOGIN ----------
        if (loginForm) {
          loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = loginEmail.value.trim();
            const password = loginPassword.value;

            if (!email || !password) {
              showToast(
                "Error",
                "Please enter both email and password.",
                "error",
              );
              return;
            }

            // Disable button, show spinner
            loginBtn.disabled = true;
            loginBtnText.textContent = "Signing in...";
            loginSpinner.classList.remove("hidden");
            loginError.classList.add("hidden");

            try {
              const res = await fetch(`${API_BASE_URL}/api/admin/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include", // Important for cookies
                body: JSON.stringify({ email, password }),
              });

              const data = await res.json();

              if (!res.ok) {
                throw new Error(
                  data.message ||
                    "Login failed. Please check your credentials.",
                );
              }

              // Your backend returns: { _id, name, email, profile, role, authMethod, token, cookieSet }
              const token = data.token;
              const user = {
                _id: data._id,
                name: data.name,
                email: data.email,
                profile: data.profile,
                role: data.role,
                authMethod: data.authMethod,
              };

              // Store auth data
              localStorage.setItem("flanorx_admin_token", token);
              localStorage.setItem("flanorx_admin_user", JSON.stringify(user));

              // If remember me, store longer (optional enhancement)
              if (rememberMe.checked) {
                localStorage.setItem("flanorx_admin_remember", "true");
              }

              showToast(
                "Welcome!",
                `Signed in as ${user.name || user.email}`,
                "success",
              );

              // Redirect to dashboard after short delay
              setTimeout(() => {
                const redirectUrl =
                  new URLSearchParams(window.location.search).get("redirect") ||
                  "admin-dashboard.html";
                window.location.href = redirectUrl;
              }, 800);
            } catch (error) {
              const errorMsg =
                error.message || "Login failed. Please try again.";
              loginError.querySelector("p").textContent = errorMsg;
              loginError.classList.remove("hidden");
              showToast("Login Failed", errorMsg, "error");
            } finally {
              // Re-enable button
              loginBtn.disabled = false;
              loginBtnText.textContent = "Sign In";
              loginSpinner.classList.add("hidden");
            }
          });
        }

        // ---------- AUTO-FOCUS ----------
        if (loginEmail) {
          loginEmail.focus();
        }
      })();
    </script>
  </body>
</html>
